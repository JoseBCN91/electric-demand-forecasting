name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # Permite ejecutar este flujo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Aquí está tu ruta exacta con tu usuario y tu Space
        run: git push --force https://Jose91-BCN:$HF_TOKEN@huggingface.co/spaces/Jose91-BCN/Electricity_demand main
