name: Entrenamiento Diario (MLOps)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      # 🎯 NUEVO: Creamos el archivo de credenciales de Google al vuelo
      - name: 🔐 Configurar Credenciales GCP
        run: |
          echo '${{ secrets.GCP_CREDENTIALS_JSON }}' > credenciales-gcp.json

      - name: ⚙️ Ejecutar Pipeline Completo
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }} 
          PYTHONPATH: src
          # 🎯 NUEVO: Le decimos a Python dónde está la llave de Google y el Bucket
          GOOGLE_APPLICATION_CREDENTIALS: credenciales-gcp.json
          MODEL_BUCKET_NAME: electric-demand-models-bucket
        run: |
          echo "1. Descargando datos recientes..."
          python src/data_ingestion/ingest.py
          
          echo "2. Procesando datos..."
          python src/data_processing/process.py
          
          echo "3. Entrenando modelo CatBoost..."
          python src/training/train.py

      - name: 🚀 Enviar Modelo a Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/utils/upload_to_hf.py
