name: Entranamiento Diario (MLOps)

on:
  # 🕒 Ejecutar todos los días a las 02:00 AM (UTC)
  schedule:
    - cron: '0 2 * * *'
  # 🔘 Permite ejecutarlo a mano dándole a un botón en GitHub
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: ⚙️ Ejecutar Pipeline Completo
        env:
          # 🎯 ¡Aquí está el cambio! Ya no tiene el '#' al principio
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }} 
          PYTHONPATH: src
        run: |
          echo "1. Descargando datos recientes..."
          python src/data_ingestion/ingest.py
          
          echo "2. Procesando datos..."
          python src/data_processing/process.py
          
          echo "3. Entrenando modelo CatBoost..."
          python src/training/train.py

      - name: 🚀 Enviar Modelo a Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/utils/upload_to_hf.py
