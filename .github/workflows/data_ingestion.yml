name: 📊 Ingesta Diaria de Datos

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 AM UTC
  workflow_dispatch: # Botón manual

jobs:
  ingest-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: ⚙️ Ejecutar Ingesta y Procesamiento
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          PYTHONPATH: src
        run: |
          echo "Descargando datos..."
          python src/data_ingestion/ingest.py
          echo "Procesando features..."
          python src/data_processing/process.py

      # 🎯 NUEVO: Autenticación segura con Google Cloud
      - name: 🔐 Configurar Credenciales GCP
        run: |
          echo '${{ secrets.GCP_CREDENTIALS_JSON }}' > credenciales-gcp.json

      # 🎯 NUEVO: Subida al Bucket de Google en lugar de HF
      - name: ☁️ Subir datos procesados a GCP
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credenciales-gcp.json
        run: |
          echo "Subiendo dataset procesado a GCP Storage..."
          # Autenticamos al "robot"
          gcloud auth activate-service-account --key-file=credenciales-gcp.json
          
          # Copiamos el archivo al bucket
          gcloud storage cp data/processed/features_clean.parquet gs://electric-demand-models-bucket/data/features_clean.parquet
          
          echo "✅ ¡Datos listos en Google Cloud para el entrenamiento!"

      # Opcional: Si por algún motivo aún necesitas subir algo a HF, puedes dejar el paso anterior
      # - name: 🚀 Subir datos procesados al Space
      #   env:
      #     HF_TOKEN: ${{ secrets.HF_TOKEN }}
      #   run: python src/utils/upload_to_hf.py
